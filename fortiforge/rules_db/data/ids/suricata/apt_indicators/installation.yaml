key: ids_suricata_apt_indicators_installation
kind: ids_signature
name: Suricata Installation
version: '1.0'
engine: suricata
category: apt_indicators
signature_type: installation
risk: high
tags:
- ids
- suricata
- apt_indicators
- installation
- detection
- enterprise
content: alert tcp any any -> any any (msg:"Installation"; content:"malicious"; sid:1000000;
  rev:1;)
rollback:
  content: ''
metadata:
  author: Sud0-x
  false_positive_rate: low
  detection_accuracy: high
  enterprise_validated: true
  threat_intel_sources:
  - mitre_attack
  - nist_nvd
  - cve_database

key: os_gentoo_hardened_ssh_hardening
kind: os_hardening
name: Gentoo hardened Ssh Hardening
version: '1.0'
os: gentoo
os_version: hardened
os_type: linux
category: ssh_hardening
risk: medium
tags:
- linux
- gentoo
- hardened
- ssh_hardening
- hardening
- enterprise
content: '# SSH hardening for gentoo

  PermitRootLogin no

  PasswordAuthentication no

  Protocol 2

  MaxAuthTries 3'
rollback:
  content: ''
metadata:
  author: Sud0-x
  compliance:
  - cis
  - nist
  - iso27001
  enterprise_grade: true
  production_ready: true

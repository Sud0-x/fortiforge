key: os_oracle-linux_8_ssh_hardening
kind: os_hardening
name: Oracle-Linux 8 Ssh Hardening
version: '1.0'
os: oracle-linux
os_version: '8'
os_type: linux
category: ssh_hardening
risk: medium
tags:
- linux
- oracle-linux
- '8'
- ssh_hardening
- hardening
- enterprise
content: '# SSH hardening for oracle-linux

  PermitRootLogin no

  PasswordAuthentication no

  Protocol 2

  MaxAuthTries 3'
rollback:
  content: ''
metadata:
  author: Sud0-x
  compliance:
  - cis
  - nist
  - iso27001
  enterprise_grade: true
  production_ready: true

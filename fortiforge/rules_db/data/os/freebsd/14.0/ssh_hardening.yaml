key: os_freebsd_14.0_ssh_hardening
kind: os_hardening
name: Freebsd 14.0 Ssh Hardening
version: '1.0'
os: freebsd
os_version: '14.0'
os_type: unix
category: ssh_hardening
risk: medium
tags:
- unix

key: fail2ban_nginx
kind: service_config
service: fail2ban
name: Fail2ban nginx filter & jail
version: 1
risk: low
tags: [service, fail2ban, nginx]
content: |
  [nginx-http-auth]
  enabled = true
  filter = nginx-http-auth
  logpath = /var/log/nginx/error.log
  maxretry = 5
rollback: { content: "" }

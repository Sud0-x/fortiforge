key: svc_nginx_tls_ssl
kind: service_hardening
name: Nginx Tls Ssl
version: '1.0'
service: nginx
category: web_servers
hardening_type: tls_ssl
risk: medium
tags:
- service
- nginx
- tls_ssl
- web_servers
- enterprise
content: 'ssl_protocols TLSv1.2 TLSv1.3;

  ssl_prefer_server_ciphers on;

  ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512;'
rollback:
  content: ''
metadata:
  author: Sud0-x
  enterprise_grade: true
  production_tested: true
  performance_impact: low

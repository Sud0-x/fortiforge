key: fw_iptables_web_security_block_sql_injection
kind: firewall_rule
name: Iptables Block Sql Injection
version: '1.0'
engine: iptables
category: web_security
rule_type: block_sql_injection
risk: high
tags:
- firewall
- iptables
- web_security
- block_sql_injection
- network_security
- enterprise
content: -A INPUT -p tcp --dport 80 -m string --string 'union select' --algo bm -j
  DROP
rollback:
  content: ''
metadata:
  author: Sud0-x
  network_impact: medium
  performance_impact: low
  enterprise_tested: true

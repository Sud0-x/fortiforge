key: azure_nsg_ssh_admin
kind: cloud_firewall
engine: azure_nsg
name: Azure NSG Allow SSH from admin range
version: 1
risk: low
tags: [cloud, azure, nsg, ssh]
content: |
  [
    {
      "name": "Allow-SSH-Admin",
      "priority": 120,
      "direction": "Inbound",
      "access": "Allow",
      "protocol": "Tcp",
      "sourceAddressPrefix": "10.0.0.0/8",
      "sourcePortRange": "*",
      "destinationAddressPrefix": "*",
      "destinationPortRange": "22"
    }
  ]
